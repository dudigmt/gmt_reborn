{% extends 'base.html' %}
{% load static %}

{% block title %}Administration - GMT Reborn{% endblock %}

{% block body %}
<div class="drawer lg:drawer-open">
    <input id="main-drawer" type="checkbox" class="drawer-toggle" />
    
    <!-- Main Content -->
    <div class="drawer-content flex flex-col">
        <!-- Navbar -->
        <div class="navbar bg-cobalt text-white sticky top-0 z-10 shadow-md">
            <div class="flex-none lg:hidden">
                <label for="main-drawer" class="btn btn-square btn-ghost">
                    <i class="fa-solid fa-bars text-xl"></i>
                </label>
            </div>
            <div class="flex-1">
                <a class="text-xl font-bold flex items-center gap-2">
                    <img src="{% static 'assets/logo/gmtround.png' %}" alt="GMT" class="h-8 w-8">
                    GMT Reborn
                </a>
            </div>
            <div class="flex-none gap-4">
                <div class="flex items-center gap-2 bg-white/20 px-4 py-1.5 rounded-full">
                    <i class="fa-regular fa-user-shield"></i>
                    <span class="text-sm font-medium">Administration</span>
                </div>
            </div>
        </div>

        <!-- Page Content -->
        <div class="p-6">
            <!-- Tabs Navigation -->
            <div class="tabs tabs-boxed bg-base-200 p-1 mb-6">
                <a class="tab tab-lg {% if active_tab == 'users' or not active_tab %}tab-active{% endif %}" 
                   onclick="switchTab('users')" id="tab-users">
                   <i class="fa-solid fa-users-cog mr-2"></i> User Management
                </a>
                <a class="tab tab-lg {% if active_tab == 'company' %}tab-active{% endif %}" 
                   onclick="switchTab('company')" id="tab-company">
                   <i class="fa-solid fa-building mr-2"></i> Company
                </a>
                <a class="tab tab-lg {% if active_tab == 'modules' %}tab-active{% endif %}" 
                   onclick="switchTab('modules')" id="tab-modules">
                   <i class="fa-solid fa-puzzle-piece mr-2"></i> Modules
                </a>
                <a class="tab tab-lg {% if active_tab == 'system' %}tab-active{% endif %}" 
                   onclick="switchTab('system')" id="tab-system">
                   <i class="fa-solid fa-server mr-2"></i> System
                </a>
                <a class="tab tab-lg {% if active_tab == 'audit' %}tab-active{% endif %}" 
                   onclick="switchTab('audit')" id="tab-audit">
                   <i class="fa-solid fa-shield-halved mr-2"></i> Audit
                </a>
            </div>

            <!-- Tab Content Container -->
            <div id="tab-content" class="mt-4">
                <!-- Content akan diisi oleh JavaScript -->
            </div>
        </div>
    </div>

    <!-- Sidebar (sama seperti dashboard) -->
    <div class="drawer-side">
        <!-- ... sidebar content same as dashboard.html ... -->
    </div>
</div>

// Tab content data

                    <div class="flex items-center justify-between p-4 bg-base-200 rounded-lg">
                        <div class="flex items-center gap-3">
                            <i class="fa-solid fa-industry text-production text-2xl"></i>

    audit: `
        <div class="card bg-base-100 shadow-xl border-l-4 border-forest">
            <div class="card-body">
                <h2 class="card-title text-forest">Audit & Compliance</h2>
                <div class="overflow-x-auto mt-4">
                    <table class="table">

function switchTab(tabName) {
    // Update active tab
    document.querySelectorAll('.tab').forEach(tab => {
        tab.classList.remove('tab-active');
    });
    document.getElementById(`tab-${tabName}`).classList.add('tab-active');
    
    // Update content
    document.getElementById('tab-content').innerHTML = tabContents[tabName];
    currentTab = tabName;
}

// Load default tab
document.addEventListener('DOMContentLoaded', function() {
    switchTab('users');
});
</script>
{% endblock %}
