{% extends 'base_authenticated.html' %}
{% load static %}

{% block title %}Company Settings - Administration{% endblock %}

{% block content %}
{% include 'admin/partials/tabs.html' %}

<div class="card bg-base-100 shadow-xl">
    <div class="card-body">
        <h2 class="card-title">Company Profile</h2>
        <form method="post" enctype="multipart/form-data">
            {% csrf_token %}
            <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                <div class="form-control"><label class="label">Company Name</label><input type="text" name="name" value="{{ profile.name }}" class="input input-bordered" required></div>
                <div class="form-control"><label class="label">Email</label><input type="email" name="email" value="{{ profile.email }}" class="input input-bordered"></div>
                <div class="form-control"><label class="label">Phone</label><input type="text" name="phone" value="{{ profile.phone }}" class="input input-bordered"></div>
                <div class="form-control"><label class="label">Tax ID (NPWP)</label><input type="text" name="tax_id" value="{{ profile.tax_id }}" class="input input-bordered"></div>
                <div class="form-control md:col-span-2"><label class="label">Address</label><textarea name="address" class="textarea textarea-bordered" rows="3">{{ profile.address }}</textarea></div>
                <div class="form-control"><label class="label">Currency</label><input type="text" name="currency" value="{{ profile.currency }}" class="input input-bordered"></div>
                <div class="form-control"><label class="label">Date Format</label><input type="text" name="date_format" value="{{ profile.date_format }}" class="input input-bordered"></div>
                <div class="form-control"><label class="label">Company Logo</label><input type="file" name="logo" class="file-input file-input-bordered">{% if profile.logo %}<div class="mt-2"><img src="{{ profile.logo.url }}" class="h-16 w-auto"></div>{% endif %}</div>
            </div>
            <div class="mt-6"><button type="submit" class="btn btn-primary">Save Changes</button></div>
        </form>
    </div>
</div>
{% endblock %}
