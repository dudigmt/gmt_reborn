{% extends 'base_authenticated.html' %}
{% load static %}

{% block title %}Add Submodule - Administration{% endblock %}

{% block content %}
<div class="tabs tabs-boxed bg-base-200 p-1 mb-6 overflow-x-auto flex-nowrap">
    <a href="{% url 'sysadmin_users' %}" class="tab tab-lg">User Management</a>
    <a href="{% url 'sysadmin_company' %}" class="tab tab-lg">Company</a>
    <a href="{% url 'sysadmin_modules' %}" class="tab tab-lg tab-active">Modules</a>
    <a href="{% url 'sysadmin_system' %}" class="tab tab-lg">System</a>
    <a href="{% url 'sysadmin_audit' %}" class="tab tab-lg">Audit</a>
</div>

<div class="card bg-base-100 shadow-xl">
    <div class="card-body">
        <div class="flex items-center gap-3 mb-6">
            <a href="{% url 'module_settings' %}" class="btn btn-ghost btn-sm">
                <i class="fa-solid fa-arrow-left"></i> Back
            </a>
            <h2 class="card-title">Add Submodule to {{ module.display_name }}</h2>
        </div>
        
        <form method="post">
            {% csrf_token %}
            
            <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                <div class="form-control">
                    <label class="label">
                        <span class="label-text">Submodule Name (slug)</span>
                    </label>
                    <input type="text" name="name" class="input input-bordered" placeholder="employees" required>
                    <label class="label">
                        <span class="label-text-alt">Use lowercase, underscore for spaces: employees, chart_of_accounts</span>
                    </label>
                </div>
                
                <div class="form-control">
                    <label class="label">
                        <span class="label-text">Display Name</span>
                    </label>
                    <input type="text" name="display_name" class="input input-bordered" placeholder="Employees" required>
                </div>
                
                <div class="form-control">
                    <label class="label">
                        <span class="label-text">Icon (Font Awesome class)</span>
                    </label>
                    <input type="text" name="icon" class="input input-bordered" placeholder="fa-users" required>
                    <label class="label">
                        <span class="label-text-alt">Example: fa-users, fa-coins, fa-boxes, fa-chart-line</span>
                    </label>
                </div>
                
                <div class="form-control">
                    <label class="label">
                        <span class="label-text">URL</span>
                    </label>
                    <input type="text" name="url" class="input input-bordered" placeholder="/{{ module.name }}/employees/" required>
                    <label class="label">
                        <span class="label-text-alt">Example: /{{ module.name }}/employees/</span>
                    </label>
                </div>
            </div>
            
            <div class="mt-6 flex gap-3">
                <button type="submit" class="btn btn-primary">Add Submodule</button>
                <a href="{% url 'module_settings' %}" class="btn btn-ghost">Cancel</a>
            </div>
        </form>
    </div>
</div>
{% endblock %}
