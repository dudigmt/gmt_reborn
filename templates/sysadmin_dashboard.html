{% extends 'base_authenticated.html' %}
{% load static %}

{% block title %}Administration - GMT Reborn{% endblock %}

{% block content %}
<!-- Tabs Navigation -->
<div class="tabs tabs-boxed bg-base-200 p-1 mb-6 overflow-x-auto flex-nowrap">
    <a class="tab tab-lg {% if active_tab == 'users' %}tab-active{% endif %}" 
       onclick="switchTab('users')" id="tab-users">
       <i class="fa-solid fa-users-cog mr-2"></i> User Management
    </a>
    <a class="tab tab-lg {% if active_tab == 'company' %}tab-active{% endif %}" 
       onclick="switchTab('company')" id="tab-company">
       <i class="fa-solid fa-building mr-2"></i> Company
    </a>
    <a class="tab tab-lg {% if active_tab == 'modules' %}tab-active{% endif %}" 
       onclick="switchTab('modules')" id="tab-modules">
       <i class="fa-solid fa-puzzle-piece mr-2"></i> Modules
    </a>
    <a class="tab tab-lg {% if active_tab == 'system' %}tab-active{% endif %}" 
       onclick="switchTab('system')" id="tab-system">
       <i class="fa-solid fa-server mr-2"></i> System
    </a>
    <a class="tab tab-lg {% if active_tab == 'audit' %}tab-active{% endif %}" 
       onclick="switchTab('audit')" id="tab-audit">
       <i class="fa-solid fa-shield-halved mr-2"></i> Audit
    </a>
</div>

<!-- Tab Content Container -->
<div id="tab-content" class="mt-4">
    <!-- Content akan diisi JavaScript -->
</div>

function switchTab(tabName) {
    activeTab = tabName;
    document.querySelectorAll('.tab').forEach(tab => tab.classList.remove('tab-active'));
    document.getElementById(`tab-${tabName}`).classList.add('tab-active');
    document.getElementById('tab-content').innerHTML = tabContents[tabName];
}

// Load default tab
document.addEventListener('DOMContentLoaded', () => {
    switchTab('users');
});
